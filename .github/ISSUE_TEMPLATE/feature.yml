name: Feature / enhancement
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
assignees: ["Bugs5382"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: What should be built or changed?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: The problem this solves or the value it adds.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? (tests, behavior, checks)
    validations:
      required: false
